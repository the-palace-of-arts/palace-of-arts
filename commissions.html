<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Palace of Arts • Order Drawings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        :root { --navy: #0a1f3d; --orange: #ff4d00; --blue: #00d4ff; }
        * { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .hero-bg { background: linear-gradient(135deg, #0a1f3d 0%, #001233 100%); }
        .nav-link { position: relative; }
        .nav-link:after { content: ''; position: absolute; width: 0; height: 3px; bottom: -2px; left: 0; background-color: #ff4d00; }
        .nav-link:hover:after, .nav-link.active:after { width: 100%; }
    </style>
</head>
<body class="bg-[#0a1f3d] text-white">

    <!-- NAVBAR -->
    <nav class="sticky top-0 z-50 border-b border-white/10 bg-[#0a1f3d]/90 backdrop-blur-lg">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <img src="logo.jpg" alt="The Palace of Arts" class="h-12 w-auto drop-shadow-2xl cursor-pointer" onclick="window.location.href='index.html'">
                <div>
                    <h1 class="logo-font text-2xl font-bold tracking-tighter">THE PALACE</h1>
                    <p class="text-[#00d4ff] text-sm -mt-1 font-medium">OF ARTS</p>
                </div>
            </div>
            <div class="hidden md:flex items-center gap-x-8 text-sm font-medium uppercase tracking-widest">
                <a href="index.html" class="nav-link">HOME</a>
                <a href="commissions.html" class="nav-link text-[#ff4d00] font-bold active">ORDER DRAWINGS</a>
            </div>
            <a href="commissions.html" class="px-6 py-3 bg-[#ff4d00] text-white font-bold uppercase text-sm rounded-xl flex items-center gap-x-2">ORDER NOW</a>
        </div>
    </nav>

    <!-- ORDER FORM -->
    <section class="hero-bg py-20">
        <div class="max-w-3xl mx-auto px-6 text-center">
            <h1 class="logo-font text-6xl font-black">ORDER YOUR DRAWING</h1>
            <p class="text-2xl mt-4">Tell us what you want — we’ll make it fire 🔥</p>
        </div>
    </section>

    <section class="py-12 bg-black">
        <div class="max-w-3xl mx-auto px-6">
            <form onsubmit="handleSubmit(event)" class="bg-[#111827] p-8 rounded-3xl space-y-6">
                <input type="text" id="name" placeholder="YOUR NAME" class="w-full bg-white/10 border border-white/30 rounded-3xl px-6 py-5" required>
                <input type="tel" id="whatsapp" placeholder="WHATSAPP NUMBER (+250 ...)" class="w-full bg-white/10 border border-white/30 rounded-3xl px-6 py-5" required>
                <textarea id="idea" rows="6" placeholder="What do you want drawn? (be as wild as you want)" class="w-full bg-white/10 border border-white/30 rounded-3xl px-6 py-5" required></textarea>
                <button type="submit" class="w-full py-6 bg-[#ff4d00] text-2xl font-bold rounded-3xl">SEND TO THE PALACE 👑</button>
            </form>
        </div>
    </section>

    <script>
        function handleSubmit(e) {
            e.preventDefault();
            alert("🏆 Commission received! The Palace will message you on WhatsApp soon 🔥");
            e.target.reset();
        }
    </script>
</body>
</html>
